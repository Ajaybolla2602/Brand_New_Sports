    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SportGear - Cart</title>

<body class="bg-zinc-950 text-white">
    <!-- Google Tag Manager (noscript) -->
<noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-T8X9G46X"
height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>

    <!-- PASTE YOUR EXACT SAME NAVBAR HERE (from index.html) -->

    <div class="max-w-4xl mx-auto px-6 py-12">
        <h1 class="text-6xl font-black tracking-tighter mb-8">Your Cart</h1>
        
        <!-- CART ITEMS -->
        <div id="cart-items" class="space-y-8"></div>

        <!-- BEGIN CHECKOUT BUTTON -->
        <div id="checkout-btn-section" class="mt-12 bg-zinc-900 rounded-3xl p-8">
            <div class="flex justify-between text-2xl mb-6">
                <span>Total</span>
                <span id="cart-total" class="font-bold text-orange-500">$0.00</span>
            </div>
            <button onclick="beginCheckout()" 
                    class="w-full bg-orange-500 hover:bg-orange-600 py-6 rounded-3xl text-2xl font-bold transition">
                BEGIN CHECKOUT
            </button>
        </div>

        <!-- CHECKOUT FORM (hidden initially) -->
        <div id="checkout-form" class="hidden mt-12 bg-zinc-900 rounded-3xl p-8">
            <h2 class="text-4xl font-bold mb-8">Checkout</h2>
            
            <form id="order-form" onsubmit="placeOrder(event)">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <input type="text" id="name" placeholder="Full Name" required class="bg-zinc-800 border border-zinc-700 rounded-2xl px-6 py-4 text-lg">
                    <input type="email" id="email" placeholder="Email Address" required class="bg-zinc-800 border border-zinc-700 rounded-2xl px-6 py-4 text-lg">
                    <input type="tel" id="phone" placeholder="Phone Number" required class="bg-zinc-800 border border-zinc-700 rounded-2xl px-6 py-4 text-lg">
                    <input type="text" id="pincode" placeholder="Pincode" required class="bg-zinc-800 border border-zinc-700 rounded-2xl px-6 py-4 text-lg">
                </div>
                <input type="text" id="address" placeholder="Full Address" required class="mt-6 w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-6 py-4 text-lg">
                <input type="text" id="city" placeholder="City" required class="mt-6 w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-6 py-4 text-lg">

                <!-- Payment Method -->
                <div class="mt-10">
                    <p class="text-lg mb-4">Payment Method</p>
                    <div class="space-y-4">
                        <label class="flex items-center gap-3 bg-zinc-800 p-5 rounded-2xl cursor-pointer">
                            <input type="radio" name="payment" value="UPI" checked>
                            <span>UPI / PhonePe / Google Pay</span>
                        </label>
                        <label class="flex items-center gap-3 bg-zinc-800 p-5 rounded-2xl cursor-pointer">
                            <input type="radio" name="payment" value="Card">
                            <span>Credit / Debit Card</span>
                        </label>
                        <label class="flex items-center gap-3 bg-zinc-800 p-5 rounded-2xl cursor-pointer">
                            <input type="radio" name="payment" value="COD">
                            <span>Cash on Delivery (COD)</span>
                        </label>
                    </div>
                </div>

                <button type="submit"
                        class="mt-10 w-full bg-green-600 hover:bg-green-700 py-6 rounded-3xl text-2xl font-bold transition">
                    PLACE ORDER SECURELY
                </button>
            </form>
        </div>

        <!-- SUCCESS SCREEN -->
        <div id="success-screen" class="hidden text-center py-20">
            <div class="text-8xl mb-6">🎉</div>
            <h2 class="text-5xl font-black mb-4">Order Placed Successfully!</h2>
            <p class="text-2xl text-zinc-400 mb-8">Thank you for shopping with SportGear</p>
            
            <div class="bg-zinc-900 rounded-3xl p-8 inline-block text-left">
                <p class="text-sm text-zinc-400">Order ID</p>
                <p id="order-id" class="text-3xl font-bold text-orange-500 mb-6"></p>
                
                <p class="text-sm text-zinc-400">Total Paid</p>
                <p id="success-total" class="text-4xl font-bold"></p>
            </div>

            <p class="mt-10 text-zinc-400">Your order has been recorded for Google Ads conversion tracking.</p>
            <button onclick="window.location.href='shop.html'" 
                    class="mt-8 bg-orange-500 hover:bg-orange-600 px-12 py-4 rounded-3xl text-lg">
                    Continue Shopping
            </button>
        </div>
    </div>

    <!-- PASTE YOUR EXACT SAME FOOTER HERE -->

    <script>
        // Reuse the same cart logic (paste your existing cart script here or keep the shared data.js)
        let cart = JSON.parse(localStorage.getItem('cart')) || [];

        function renderCart() {
            const container = document.getElementById('cart-items');
            container.innerHTML = '';
            if (cart.length === 0) {
                container.innerHTML = `<div class="text-center py-20 text-2xl text-zinc-400">Cart is empty</div>`;
                return;
            }

            let total = 0;
            cart.forEach((item, index) => {
                const itemTotal = item.price * item.qty;
                total += itemTotal;
                const div = document.createElement('div');
                div.className = 'flex gap-8 bg-zinc-900 rounded-3xl p-6';
                div.innerHTML = `... (same as your previous cart item code) ...`; // keep your existing cart item HTML
                container.appendChild(div);
            });
            document.getElementById('cart-total').textContent = `₹${total.toFixed(2)}`;
        }

        function beginCheckout() {
            if (cart.length === 0) return alert("Cart is empty!");
            
            // 🔥 FIRE BEGIN CHECKOUT EVENT FOR GOOGLE ADS / GA4
            console.log("%c✅ begin_checkout event fired", "color:orange; font-size:16px");
            // gtag('event', 'begin_checkout', { currency: 'INR', value: total });   // ← Uncomment when gtag is added

            document.getElementById('checkout-btn-section').classList.add('hidden');
            document.getElementById('checkout-form').classList.remove('hidden');
            window.scrollTo(0, 300);
        }

        function placeOrder(e) {
            e.preventDefault();
            
            const total = parseFloat(document.getElementById('cart-total').textContent.replace('₹', '')) || 0;
            const orderId = 'SG' + Math.floor(100000 + Math.random() * 900000);

            // 🔥 FIRE PURCHASE / CONVERSION EVENT (THIS IS WHAT YOU TRACK IN GOOGLE ADS)
            console.log("%c🚀 PURCHASE EVENT FIRED - Conversion should be recorded!", "color:lime; font-size:18px");
            console.log("Order ID:", orderId, "| Amount: ₹" + total);

            // gtag('event', 'purchase', { transaction_id: orderId, value: total, currency: 'INR' });
            // OR for Google Ads conversion:
            // gtag('event', 'conversion', { send_to: 'AW-XXXXXXXXXX/XXXXXXXXXX', value: total, currency: 'INR', transaction_id: orderId });

            // Show success
            document.getElementById('checkout-form').classList.add('hidden');
            document.getElementById('success-screen').classList.remove('hidden');
            document.getElementById('order-id').textContent = orderId;
            document.getElementById('success-total').innerHTML = `₹${total.toFixed(2)}`;

            // Clear cart after successful order
            localStorage.removeItem('cart');
            cart = [];
        }

        // Initial load
        window.onload = () => {
            renderCart();
            updateCartCount();   // your existing function
        };
    </script>
