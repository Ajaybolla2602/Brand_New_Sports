<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SportGear - Cart</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="bg-zinc-950 text-white">
    <!-- PASTE THE EXACT SAME NAVBAR FROM index.html HERE -->

    <div class="max-w-4xl mx-auto px-6 py-12">
        <h1 class="text-6xl font-black tracking-tighter mb-12">Your Cart</h1>
        
        <div id="cart-items" class="space-y-8">
            <!-- JS populated -->
        </div>

        <div class="mt-12 bg-zinc-900 rounded-3xl p-8">
            <div class="flex justify-between text-2xl mb-4">
                <span>Total</span>
                <span id="cart-total" class="font-bold text-orange-500">$0.00</span>
            </div>
            <button onclick="checkout()" 
                    class="w-full bg-orange-500 hover:bg-orange-600 py-6 rounded-3xl text-2xl font-bold transition">
                PROCEED TO CHECKOUT (DEMO)
            </button>
            <p class="text-center text-zinc-400 text-sm mt-4">This is a demo — no real payment</p>
        </div>
    </div>

    <!-- PASTE THE EXACT SAME FOOTER FROM index.html HERE -->

    <script>
        // Paste the ENTIRE <script> block from index.html (products array + cart functions)
        // Replace window.onload with this:

        function renderCart() {
            const container = document.getElementById('cart-items')
            container.innerHTML = ''
            
            if (cart.length === 0) {
                container.innerHTML = `<div class="text-center py-20 text-zinc-400 text-2xl">Your cart is empty 🛒<br><a href="shop.html" class="text-orange-500 underline">Start shopping</a></div>`
                document.getElementById('cart-total').textContent = '$0.00'
                return
            }

            let total = 0
            cart.forEach((item, index) => {
                const itemTotal = item.price * item.qty
                total += itemTotal
                
                const div = document.createElement('div')
                div.className = 'flex gap-8 bg-zinc-900 rounded-3xl p-6'
                div.innerHTML = `
                    <img src="${item.img}" class="w-32 h-32 object-cover rounded-2xl">
                    <div class="flex-1">
                        <h3 class="font-semibold text-xl">${item.name}</h3>
                        <p class="text-orange-500">$${item.price}</p>
                        
                        <div class="flex items-center gap-6 mt-8">
                            <div class="flex border border-zinc-700 rounded-2xl">
                                <button onclick="changeQty(${index}, -1)" class="px-5 py-3 text-xl">-</button>
                                <span class="px-8 py-3 text-xl font-medium">${item.qty}</span>
                                <button onclick="changeQty(${index}, 1)" class="px-5 py-3 text-xl">+</button>
                            </div>
                            <button onclick="removeFromCart(${index})" class="text-red-500 hover:text-red-600">
                                <i class="fa-solid fa-trash text-xl"></i>
                            </button>
                        </div>
                    </div>
                    <div class="text-right">
                        <div class="text-3xl font-bold">$${itemTotal.toFixed(2)}</div>
                    </div>
                `
                container.appendChild(div)
            })
            
            document.getElementById('cart-total').textContent = `$${total.toFixed(2)}`
        }

        function changeQty(index, change) {
            cart[index].qty += change
            if (cart[index].qty < 1) cart[index].qty = 1
            localStorage.setItem('cart', JSON.stringify(cart))
            renderCart()
            updateCartCount()
        }

        function removeFromCart(index) {
            cart.splice(index, 1)
            localStorage.setItem('cart', JSON.stringify(cart))
            renderCart()
            updateCartCount()
        }

        function checkout() {
            if (cart.length === 0) return
            alert("🎉 Thank you! This is a demo website.\n\nOrder total: " + document.getElementById('cart-total').textContent + "\n\nIn real project we would connect Stripe/PayPal here.")
            // Optional: clear cart after "purchase"
            // cart = []; localStorage.setItem('cart', JSON.stringify(cart)); renderCart(); updateCartCount()
        }

        window.onload = function() {
            renderCart()
            updateCartCount()
        }
    </script>
</body>
</html>
